<!DOCTYPE html><html class="light" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .login-card-shadow {
            box-shadow: 0px 12px 32px rgba(15, 23, 42, 0.12);
        }
    </style>

<body class="bg-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Main Container -->
<main class="w-full max-w-[1440px] flex justify-center items-center">
<!-- Login Card Section -->
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant rounded-lg p-lg md:p-xl login-card-shadow">
<!-- Branding Header -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center bg-primary-container text-on-primary p-sm rounded mb-md">
<span class="material-symbols-outlined text-[32px]" data-icon="task_alt">task_alt</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary mb-xs">TaskOps</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enterprise Edition Management Portal</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="w-full bg-surface p-1 rounded-lg border border-outline-variant flex items-center mb-6">
  <button type="button" class="flex-1 py-2 text-label-md font-medium rounded-md transition-all text-on-surface-variant hover:text-primary">
    Admin
  </button>
  <button type="button" class="flex-1 py-2 text-label-md font-medium rounded-md transition-all bg-primary-container text-on-primary shadow-sm">
    Member
  </button>
</div><div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-md py-sm rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md text-body-md" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-on-primary-fixed-variant hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-md py-sm rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary-container border-outline-variant rounded focus:ring-primary-container" id="remember" name="remember" type="checkbox">
<label class="ml-sm font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Remember this device for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full py-md bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm" type="submit">Sign In as Member
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span></button>
</form>
<!-- SSO / Alternative Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">

</div>
</div>
<!-- SSO Option -->

<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                    Enterprise instance restricted to authorized personnel only. 
                    <br>
<a class="text-on-primary-fixed-variant font-semibold hover:underline" href="#">Contact System Admin</a>
</p>
</div>
</div>
</main>
<!-- Background Illustration / Decorative Element -->
<div class="fixed inset-0 -z-10 overflow-hidden opacity-50">
<div class="absolute -top-1/4 -right-1/4 w-1/2 h-1/2 bg-secondary-container rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-1/2 h-1/2 bg-primary-fixed-dim rounded-full blur-[120px]"></div>
</div>

<div class="hidden">
